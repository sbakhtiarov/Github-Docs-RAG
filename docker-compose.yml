services:
  rag-ingest:
    build: .
    image: github-docs-rag:local
    command: ["node", "dist/src/cli.js", "ingest", "--pull"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSION: ${OPENAI_EMBEDDING_DIMENSION:-1536}
      GITHUB_DOCS_RAG_CACHE_DIR: /app/.cache/github-docs-rag
      GITHUB_DOCS_RAG_DB_PATH: /app/.cache/github-docs-rag/github-docs-rag.sqlite
      GITHUB_DOCS_RAG_SOURCE_DIR: /app/.cache/github-docs-rag/github-docs
    restart: "no"
    volumes:
      - rag-cache:/app/.cache/github-docs-rag

  rag-mcp:
    build: .
    image: github-docs-rag:local
    command: ["node", "dist/src/cli.js", "mcp-http"]
    depends_on:
      rag-ingest:
        condition: service_completed_successfully
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSION: ${OPENAI_EMBEDDING_DIMENSION:-1536}
      GITHUB_DOCS_RAG_CACHE_DIR: /app/.cache/github-docs-rag
      GITHUB_DOCS_RAG_DB_PATH: /app/.cache/github-docs-rag/github-docs-rag.sqlite
      GITHUB_DOCS_RAG_SOURCE_DIR: /app/.cache/github-docs-rag/github-docs
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
      MCP_HTTP_PATH: /mcp
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - rag-cache:/app/.cache/github-docs-rag

volumes:
  rag-cache:
